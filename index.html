<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="91hWo-KLIf22Oe8DgepBPAW7Q3AsirZHLwAqaSBdHmA" />
  <title>Saheen Feroz — Photography</title>
  <meta name="description" content="Photography portfolio by Saheen Feroz." />
  <link rel="canonical" href="https://saheenferoz.github.io/" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://saheenferoz.github.io/" />
  <meta property="og:title" content="Saheen Feroz — Photography" />
  <meta property="og:description" content="Photography portfolio by Saheen Feroz." />
  <meta property="og:image" content="https://saheenferoz.github.io/avatar.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="profile-header">
    <img class="avatar" id="avatar" src="" alt="Profile photo">
    <h1 class="name" id="profile-name">Saheen Feroz</h1>
    <p class="tagline" id="profile-tagline"></p>
  </header>

  <main>
    <div class="photo-grid" id="photo-grid"></div>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous photo">&#8249;</button>
    <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next photo">&#8250;</button>
    <div class="lightbox-content">
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
      <div class="lightbox-details">
        <p class="lightbox-caption is-empty" id="lightbox-caption"></p>
        <div class="lightbox-meta">
          <span class="lightbox-location" id="lightbox-location">
            <svg class="pin-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span id="lightbox-location-text"></span>
          </span>
          <span class="lightbox-date" id="lightbox-date"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
